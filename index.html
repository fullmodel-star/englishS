<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, ">
<meta name="theme-color" content="#F0E9F4">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="ridgeline-ui.css">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="國中英語句型">
<title>國中英語句型</title>
<style>
  :root{
    /* 語意狀態色保留：正解綠 / 答錯紅 / 錯位金 */
    --green:#58cc02; --green-d:#4caf00; --green-l:#d7ffb8;
    --blue:#5bc0eb; --red:#ff6b81; --gold:#ffb703;
    /* 稜線識別 · theme-plum（梅紫）：品牌色改梅紫，紙背＋岩藍墨 */
    --brand:#7A4E8C; --brand-d:#653F75;
    --ink:#141E2B; --gray:#E4DDCE; --gray-d:#6E8BA3; --bg:#fff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    color:var(--ink);background:#F7F3EC;
    display:flex;flex-direction:column;align-items:center;overflow:hidden;user-select:none;
  }
  #app{width:100%;max-width:520px;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}
  .screen{flex:1;overflow-y:auto;display:none;flex-direction:column}
  .screen.on{display:flex}
  .pad{padding:16px 18px 24px}
  .hdr{text-align:center;padding:20px 18px 6px}
  .hdr h1{font-size:24px;margin:0;color:var(--brand);letter-spacing:.5px}
  .hdr p{margin:5px 0 0;color:var(--gray-d);font-size:12.5px}
  .hero{margin:12px 14px 8px;border-radius:16px;padding:14px 16px 12px;color:var(--ink);text-align:center;
    background:var(--tint)}
  .hero h1{display:none}
  .hero p{display:none}
  .hero .stats{display:flex;gap:10px;margin-top:2px}
  .hero .stats .st{flex:1;background:#fff;border-radius:14px;padding:11px 4px;
    border:1px solid var(--line)}
  .hero .stats .st b{display:block;font-size:20px;font-weight:900;color:var(--brand)}
  .hero .stats .st small{font-size:10.5px;color:var(--gray-d);font-weight:600}

  /* ---- stage cards ---- */
  .card{position:relative;display:flex;align-items:center;gap:15px;border-radius:16px;padding:15px 16px;
    margin-bottom:15px;cursor:pointer;transition:transform .12s;--c:#43a047;background:#fff;
    border:1.5px solid color-mix(in srgb,var(--c) 30%,var(--line))}
  .card:active{transform:translateY(2px)}
  .card.cur{border:2px solid var(--c);background:color-mix(in srgb,var(--c) 6%,#fff)}
  .card.lockcard{cursor:default;background:#faf7f0;border-color:var(--line)}
  .ring{width:54px;height:54px;border-radius:15px;flex:none;display:grid;place-items:center;font-size:27px;
    color:#fff;background:var(--c)}
  .card.lockcard .ring{background:#e6e2d8;filter:grayscale(1);font-size:22px;opacity:.6}
  .ring i{display:contents}
  .card .info{flex:1;min-width:0}
  .card .info b{font-size:16.5px;display:block;font-weight:800;color:#363636}
  .card.lockcard .info b{color:#a2a2a2}
  .card .info small{font-size:12px;display:block;margin-top:3px;font-weight:600;color:#9c9c9c}
  .card .arw{font-size:24px;font-weight:800;color:var(--c)}

  /* ---- unit path ---- */
  .backbar{display:flex;align-items:center;gap:8px;padding:16px 16px 8px;font-weight:800;font-size:17px}
  .backbar button{font-size:26px;background:none;border:none;cursor:pointer;color:var(--gray-d);line-height:1;
    min-width:44px;min-height:44px;display:grid;place-items:center;margin-left:-8px}
  .path{padding:8px 16px 30px}
  .unode{display:flex;align-items:center;gap:13px;background:#fff;border-radius:16px;padding:13px 14px;
    margin-bottom:12px;border:1.5px solid var(--line);--c:#7ac74f}
  .unode.open{cursor:pointer;transition:transform .1s}
  .unode.open:active{transform:scale(.98)}
  .unode.cur{border:2px solid var(--c)}
  .unode .udot{width:50px;height:50px;border-radius:15px;flex:none;display:grid;place-items:center;
    font-size:25px;color:#fff;background:var(--c)}
  .unode.lock .udot{background:#e6e2d8;font-size:20px;filter:grayscale(1) opacity(.55)}
  .unode .ulab{flex:1;min-width:0}
  .unode .ulab b{font-size:15.5px;font-weight:800;display:block}
  .unode.lock .ulab b{color:#a6a6a6}
  .unode .ulab small{color:#707070;font-size:12px;display:block;margin-top:3px}
  .unode .ust{flex:none;font-weight:800}
  .unode .ust .st-star{color:var(--gold);letter-spacing:1px;font-size:14px}
  .unode .ust .st-go{background:var(--c);color:#fff;border-radius:12px;padding:6px 15px;font-size:12.5px}
  .unode .ust .st-lock{color:#d2d2d2;font-size:20px}

  /* ---- progress dashboard ---- */
  .big-ring{width:130px;height:130px;border-radius:50%;margin:6px auto 2px;display:grid;place-items:center;
    background:conic-gradient(var(--brand) var(--p),var(--gray) 0)}
  .big-ring i{width:104px;height:104px;border-radius:50%;background:#fff;display:grid;place-items:center;
    flex-direction:column;font-style:normal;text-align:center}
  .big-ring i b{font-size:28px;color:var(--brand)} .big-ring i small{color:var(--gray-d);font-size:12px}
  .kpis{display:flex;gap:10px;margin:14px 0}
  .kpi{flex:1;background:#fff;border:2px solid var(--gray);border-bottom-width:4px;border-radius:14px;
    padding:12px 6px;text-align:center}
  .kpi b{display:block;font-size:22px} .kpi small{color:var(--gray-d);font-size:11.5px}
  .sec-t{font-weight:800;margin:18px 0 8px;font-size:15px}
  .prow{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:11px}
  .prow .pr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .prow .nm{font-weight:800;font-size:14.5px;display:flex;align-items:center;gap:7px}
  .prow .pc{color:var(--gray-d);font-weight:700;font-size:13px;flex:none}
  .prow .tb{height:12px;background:var(--gray);border-radius:6px;overflow:hidden}
  .prow .tb>i{display:block;height:100%;border-radius:6px;min-width:0;transition:width .4s}

  /* ---- mistakes ---- */
  .mist-hero{text-align:center;padding:10px 0 4px}
  .mist-hero .n{font-size:44px;font-weight:800;color:var(--red)}
  .mi{background:#fff;border:2px solid var(--gray);border-radius:12px;padding:10px 12px;margin-bottom:8px}
  .mi .zh{font-weight:700;font-size:15px}
  .mi .en{color:#6b6b6b;font-size:13.5px;margin-top:3px}
  .mi .box{float:right;font-size:11px;color:#fff;background:var(--gold);border-radius:8px;padding:2px 7px;font-weight:700}
  .empty{text-align:center;color:var(--gray-d);padding:50px 20px;font-size:14px;line-height:1.8}

  /* ---- lesson ---- */
  #lesson{padding:12px 16px 16px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .x{font-size:26px;color:var(--gray-d);background:none;border:none;cursor:pointer;line-height:1;
    min-width:44px;min-height:44px;display:grid;place-items:center}
  .bar{flex:1;height:14px;background:var(--gray);border-radius:8px;overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--brand);border-radius:8px;width:0;transition:width .3s}
  .hearts{color:var(--red);font-weight:800;font-size:16px;min-width:34px;text-align:right}
  .qwrap{flex:1;display:flex;flex-direction:column;padding-top:14px}
  .qright{display:flex;flex-direction:column;flex:1;min-height:0}
  .qhint{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--gray-d);margin-bottom:8px}
  .lchip{margin-left:auto;border:2px solid var(--blue);color:var(--blue);border-radius:20px;
    padding:3px 10px;font-size:12px;font-weight:700;cursor:pointer;background:#fff}
  .lchip.on{background:var(--blue);color:#fff}
  .speak{display:flex;align-items:center;gap:14px;margin-bottom:8px}
  .spk-btn{width:60px;height:60px;border-radius:16px;border:2px solid var(--blue);border-bottom-width:5px;
    background:var(--blue);color:#fff;font-size:26px;cursor:pointer;flex:none}
  .spk-btn:active{transform:translateY(2px);border-bottom-width:3px}
  .zh{font-size:22px;font-weight:700;line-height:1.4}
  .answer{margin-top:18px;min-height:96px;border:2px dashed #e0e0e0;border-radius:16px;background:#fafbf8;
    padding:13px;display:flex;flex-wrap:wrap;gap:9px;align-content:flex-start;position:relative}
  .answer:empty::before{content:"👇 點下方詞塊，依序排出句子";position:absolute;left:15px;top:16px;
    color:#a0a0a0;font-size:13px;font-weight:600}
  .bank{margin-top:22px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;min-height:56px}
  .tile{background:#fff;border:2px solid var(--gray);border-bottom-width:4px;border-radius:13px;
    padding:10px 15px;font-size:20px;cursor:pointer;transition:transform .06s;font-weight:600}
  .tile:active{transform:translateY(2px)}
  .tile.hole{background:var(--gray);border-color:var(--gray);color:transparent;pointer-events:none}
  .tile.punc{color:var(--gray-d)}
  .tile.glow{border-color:#e69500;background:#fff7e6;color:#b36b00;animation:glowpulse .6s ease-in-out 4}
  @keyframes glowpulse{0%,100%{box-shadow:0 0 0 0 rgba(230,149,0,.0);transform:none}
    50%{box-shadow:0 0 0 6px rgba(230,149,0,.28);transform:translateY(-2px)}}
  .check{margin-top:auto;padding-top:16px}
  .btn{width:100%;padding:15px;border:none;border-radius:16px;font-size:17px;font-weight:800;cursor:pointer;
    color:#fff;background:var(--gray-d);border-bottom:5px solid rgba(0,0,0,.18)}
  .btn.go{background:var(--brand);border-bottom-color:var(--brand-d)}
  .btn:disabled{opacity:.55} .btn:active{transform:translateY(2px);border-bottom-width:2px}
  .sheet{position:absolute;left:0;right:0;bottom:0;padding:18px 16px 22px;border-radius:22px 22px 0 0;
    transform:translateY(110%);transition:transform .25s;z-index:20}
  .sheet.show{transform:translateY(0)}
  .sheet.ok{background:var(--green-l)} .sheet.no{background:#ffdfe0}
  .sheet .hd{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px}
  .sheet.ok .hd{color:var(--green-d)} .sheet.no .hd{color:var(--red)}
  .sheet .sol{margin:8px 0 14px;font-size:15px}
  .shake{animation:sh .35s}
  @keyframes sh{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

  /* ---- done ---- */
  #done{align-items:center;justify-content:center;text-align:center;padding:30px;gap:6px}
  #done .big{font-size:66px} #done h2{margin:4px 0;color:var(--brand)}
  #done .stat{display:flex;gap:14px;margin:16px 0 26px}
  #done .stat div{background:#fff;border:2px solid var(--gray);border-bottom-width:4px;border-radius:16px;padding:12px 20px}
  #done .stat b{display:block;font-size:24px} #done .stat small{color:var(--gray-d)}

  /* ---- bottom nav ---- */
  nav{display:flex;border-top:2px solid var(--gray);background:#fff}
  nav.hide{display:none}
  nav button{flex:1;background:none;border:none;padding:11px 0 10px;cursor:pointer;color:var(--gray-d);
    font-size:11px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px}
  nav button .ni{font-size:21px}
  nav button.act{color:var(--brand)}
  .badge{position:relative}
  .badge[data-n]:not([data-n="0"])::after{content:attr(data-n);position:absolute;top:-3px;right:50%;
    transform:translateX(18px);background:var(--red);color:#fff;font-size:10px;border-radius:9px;padding:0 5px;font-weight:800}

  /* 題目 emoji 輔助 */
  .qemoji{font-size:44px;text-align:center;line-height:1;margin-bottom:6px;min-height:0}
  .qemoji:empty{display:none}
  /* 已排入答題框的詞塊：藍色描邊區分 + 排入微動畫 */
  .answer .tile{border-color:var(--brand);background:var(--tint);color:var(--brand-d);animation:pop .14s ease}
  .tile.bad{border-color:var(--red)!important;background:#ffe9ec!important;color:var(--red)!important}
  @keyframes pop{0%{transform:scale(.7);opacity:.3}100%{transform:scale(1);opacity:1}}
  /* 提示鈕 + 檢查鈕並排 */
  .check{display:flex;gap:10px}
  .check .btn{flex:1;width:auto}
  .btn.hint{flex:none!important;padding:15px 16px;background:#fff;color:#e69500;
    border:2px solid var(--gold);border-bottom:5px solid #e0a000}
  /* 愛心用完彈窗 */
  .modal-wrap{position:absolute;inset:0;background:rgba(0,0,0,.45);display:none;
    align-items:center;justify-content:center;z-index:50;padding:24px}
  .modal-wrap.show{display:flex}
  .modal{background:#fff;border-radius:20px;padding:26px 22px;max-width:340px;width:100%;text-align:center;
    border:1px solid var(--line);animation:pop .2s ease}
  .modal .m-emoji{font-size:52px}
  .modal .m-title{font-size:21px;font-weight:800;margin:8px 0 6px}
  .modal .m-msg{color:#888;font-size:13.5px;margin-bottom:20px;line-height:1.6}

  /* ===== 平板／橫式 寬螢幕自適應 ===== */
  @media (min-width:700px){
    #app{max-width:1000px}
    /* 首頁關卡卡片：雙欄 */
    #learn .pad{display:grid;grid-template-columns:1fr 1fr;column-gap:18px;align-content:start}
    /* 單元路徑：雙欄 */
    .path{display:grid;grid-template-columns:1fr 1fr;column-gap:16px;align-content:start}
    /* 進度／錯題本：置中不要拉太寬 */
    #progress .pad,#mistakes .pad{max-width:700px;margin:0 auto;width:100%}
    #progress .kpis .kpi b{font-size:24px}
    /* 課程：寬螢幕改「置中單欄(加寬)」，避免雙欄左側空蕩 */
    #lesson{align-items:center}
    #lesson .top,#lesson .qwrap{width:100%;max-width:660px}
    .qleft{text-align:center;margin-top:8px}
    .qleft .speak{justify-content:center;gap:16px}
    .qleft .spk-btn{width:72px;height:72px;font-size:32px}
    .qleft .zh{font-size:28px}
    .qemoji{font-size:56px;margin-bottom:10px}
    .answer{min-height:110px}
  }
  #installBar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(66px + env(safe-area-inset-bottom));z-index:50;width:calc(100% - 24px);max-width:440px}
  #installBar:empty{display:none}
  #installBar .install-btn{display:block;width:100%;border:0;border-radius:14px;padding:13px 15px;font-size:15px;font-weight:800;cursor:pointer;background:var(--brand);color:#fff}
  #installBar .install-btn.sec{background:var(--tint);color:var(--brand)}
  #installBar .install-tip{background:#fff7e6;border:1px solid #ffe0a3;border-radius:14px;padding:13px;font-size:13px;line-height:1.85;color:#5a4a1a}
  #installBar .install-x{display:inline-block;margin-top:6px;color:var(--brand);font-weight:800;cursor:pointer}

  /* ---- 稜線識別：masthead 顯示規則 ---- */
  .rl-appbar{border-bottom:1px solid var(--line);flex:none}
  #app:has(nav.hide) .rl-appbar{display:none}
</style>
</head>

/* ===== 課程流程 ===== */
let mode="unit", qList=[], qIdx=0, origLen=0, hp=5, correct=0, xp=0, answer=[], curKeyInfo=null, badIdx=-1, qHinted=false;

function startUnit(si,ui){
  mode="unit"; curKeyInfo={si,ui,key:uKey(si,ui),unit:STAGES[si].units[ui]};
  qList=STAGES[si].units[ui].qs.map((q,i)=>tagQ(q,uKey(si,ui),i,STAGES[si].units[ui].name,STAGES[si].units[ui].cat));
  beginLesson();
}
function startReviewStage(si){
  mode="review";
  let pool=[];
  STAGES[si].units.forEach((u,ui)=>u.qs.forEach((q,i)=>pool.push(tagQ(q,uKey(si,ui),i,u.name,u.cat))));
  shuffle(pool); qList=pool.slice(0,15);
  beginLesson();
}
function startReviewMist(){
  mode="review";
  const keys=activeMist();
  keys.sort((a,b)=>MIST[a].box-MIST[b].box);
  qList=keys.slice(0,20).map(k=>{const m=MIST[k];return {_qid:k,zh:m.zh,t:m.t,d:m.d,cat:m.cat,unit:m.unit};});
  if(!qList.length){showTab("mistakes");return;}
  beginLesson();
}
function tagQ(q,key,i,unit,cat){return {_qid:key+"#"+i,zh:q.zh,t:q.t,d:q.d||[],cat:cat,unit:unit};}

function beginLesson(){
  qIdx=0; origLen=qList.length; hp=5; correct=0; xp=0;
  $("#hearts").style.visibility = mode==="review"?"hidden":"visible";
  $("#qtag").textContent = mode==="review"?"複習模式":"把中文翻成英文";
  $("#lchip").classList.toggle("on",SET.listen);
  ["learn","progress","mistakes","done"].forEach(s=>$("#"+s).classList.remove("on"));
  $("#lesson").classList.add("on"); $("#nav").classList.add("hide");
  loadQ();
}
function loadQ(){
  const q=qList[qIdx]; answer=[]; badIdx=-1; qHinted=false; updateHintBtn();
  q._tiles=shuffle([...q.t,...q.d].map((w,k)=>({w,id:k,taken:false})));
  applyListen(q); setQEmoji(q);
  $("#pbar").style.width=Math.min(qIdx/origLen*100,100)+"%";
  $("#hp").textContent=hp;
  $("#sheet").className="sheet";
  draw(); setTimeout(speakCur,350);
}
function applyListen(q){
  if(SET.listen){$("#zh").textContent="🎧 聽音檔，拼出英文句子";$("#zh").style.color="var(--gray-d)";}
  else{$("#zh").textContent=q.zh;$("#zh").style.color="";}
}
function draw(){
  const q=qList[qIdx],A=$("#answer"),B=$("#bank");A.innerHTML="";B.innerHTML="";
  answer.forEach((o,i)=>{const t=tile(o,()=>move(o,false));if(i===badIdx)t.classList.add("bad");A.appendChild(t);});
  q._tiles.forEach(o=>{
    if(o.taken){const hl=document.createElement("div");hl.className="tile hole";hl.textContent=o.w;B.appendChild(hl);return;}
    B.appendChild(tile(o,()=>move(o,true)));
  });
  const btn=$("#checkBtn"),ok=answer.length>0;btn.disabled=!ok;btn.classList.toggle("go",ok);
}
function tile(o,onTap){
  const d=document.createElement("div");
  d.className="tile"+(/^[.?!,]$/.test(o.w)?" punc":"");d.textContent=o.w;d.dataset.tid=o.id;
  let lp,fired=false;
  d.addEventListener("pointerdown",()=>{fired=false;lp=setTimeout(()=>{fired=true;speakWord(o.w);},450);});
  const cx=()=>clearTimeout(lp);
  d.addEventListener("pointerup",cx);d.addEventListener("pointercancel",cx);d.addEventListener("pointerleave",cx);
  d.addEventListener("click",()=>{if(fired){fired=false;return;}onTap();});
  return d;
}
function move(o,toAns){
  badIdx=-1;
  if(toAns){o.taken=true;answer.push(o);}else{o.taken=false;answer=answer.filter(x=>x!==o);}
  draw();
}
function check(){
  const q=qList[qIdx];
  const user=answer.map(o=>o.w).join(" ");
  const accepts=[q.t.join(" ")].concat(q.accept||[]);   // 支援多組正解
  const ok=accepts.includes(user);
  record(q,ok,qHinted);
  const s=$("#sheet");
  if(ok){
    playSound(true);
    if(qHinted){
      xp+=3;
      s.className="sheet ok show";
      $("#sheetHd").innerHTML="✅ 完成（靠提示）· +3 XP";
      $("#sheetSol").innerHTML=`<b>${pretty(q.t)}</b><div style="color:var(--gray-d);font-size:12px;margin-top:5px;line-height:1.5">💡 這題有用提示，先收進錯題本；之後自己拼對一次才算真的學會囉！</div>`;
      speakCur();
    }else{
      correct++;xp+=10;
      Ninja.gain(10,'pinju',{correct:1});   // 真的答對→灌進火影修行經驗
      s.className="sheet ok show";
      $("#sheetHd").innerHTML="✅ 答對了！ +10 XP";
      $("#sheetSol").innerHTML=`<b>${pretty(q.t)}</b>`;
      speakCur();
    }
  }else{
    playSound(false);
    if(mode!=="review"){hp--;$("#hp").textContent=hp;}
    // 標出第一個排錯的位置
    badIdx=-1;
    for(let i=0;i<Math.max(answer.length,q.t.length);i++){
      if((answer[i]&&answer[i].w||"")!==(q.t[i]||"")){badIdx=i;break;}
    }
    draw();
    $("#answer").classList.add("shake");setTimeout(()=>$("#answer").classList.remove("shake"),350);
    s.className="sheet no show";
    $("#sheetHd").innerHTML="❌ 正確答案是";
    const tip=badIdx>=0?`<div style="color:var(--red);font-size:12.5px;margin-top:5px">💡 第 ${badIdx+1} 個位置開始不對，紅色框就是要改的地方</div>`:"";
    $("#sheetSol").innerHTML=`<b>${pretty(q.t)}</b>${tip}`;
    if(mode!=="review")qList.push(q);          // 一般模式：答錯重排到尾端
    if(mode!=="review"&&hp<=0){setTimeout(showHeartsModal,550);}
  }
}
function record(q,ok,hinted){
  STAT.answered++; if(ok&&!hinted)STAT.correct++;   // 靠提示不計正確率
  const M=MIST[q._qid];
  if(!ok||hinted){                                   // 答錯 或 靠提示 → 進錯題本、之後再自己練
    MIST[q._qid]={zh:q.zh,t:q.t,d:q.d,cat:q.cat,unit:q.unit,box:1,wrong:(M?M.wrong:0)+(ok?0:1)};
  }else if(M){
    M.box++; if(M.box>=6)delete MIST[q._qid];         // 連續(自己)答對畢業
  }
  saveM();
}
function nextQ(){
  $("#sheet").className="sheet";qIdx++;
  if(qIdx>=qList.length){finish();return;}
  loadQ();
}
function localDay(dt){return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}
function markStreak(){
  const d=new Date(),today=localDay(d);   // 用本地日期，避免凌晨(UTC)誤算連續天數
  if(STAT.lastDay!==today){
    const y=localDay(new Date(d.getTime()-864e5));
    STAT.streak = STAT.lastDay===y ? STAT.streak+1 : 1;
    STAT.lastDay=today;
  }
  STAT.days[today]=(STAT.days[today]||0)+correct;
  saveS();
}
function finish(){
  const total=qIdx, acc=Math.round(correct/total*100);
  markStreak();
  if(mode==="unit"){
    const stars=acc>=90?3:acc>=70?2:1, k=curKeyInfo.key;
    const prev=PROG[k]?.stars||0, pxp=PROG[k]?.xp||0;
    PROG[k]={stars:Math.max(prev,stars),xp:Math.max(pxp,xp)};
    saveP();
    $("#doneTitle").textContent="單元完成！";
    $("#doneEmoji").textContent=acc>=90?"🏆":acc>=70?"🎉":"💪";
  }else{
    $("#doneTitle").textContent="複習完成！";
    $("#doneEmoji").textContent="🎯";
  }
  $("#dXp").textContent=xp;$("#dAcc").textContent=acc+"%";
  ["learn","progress","mistakes","lesson"].forEach(s=>$("#"+s).classList.remove("on"));
  $("#done").classList.add("on"); $("#nav").classList.add("hide");
}
function quit(){try{speechSynthesis.cancel();}catch(e){} curStage=curKeyInfo?curKeyInfo.si:curStage; showTab("learn");}

/* ===== 發音 + 音效 ===== */
function speakCur(){
  if(!window.speechSynthesis)return;
  const q=qList[qIdx];const txt=pretty(q.t).replace(/[?.!]/g,"");
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);u.lang="en-US";u.rate=.9;speechSynthesis.speak(u);
}
let AC=null;
function playSound(ok){
  try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended")AC.resume();
    const seq=ok?[[660,0],[880,.1]]:[[200,0]];
    seq.forEach(([f,t])=>{const o=AC.createOscillator(),g=AC.createGain();
      o.frequency.value=f;o.type=ok?"sine":"square";o.connect(g);g.connect(AC.destination);
      const s=AC.currentTime+t;g.gain.setValueAtTime(.001,s);g.gain.exponentialRampToValueAtTime(.25,s+.02);
      g.gain.exponentialRampToValueAtTime(.001,s+(ok?.18:.3));o.start(s);o.stop(s+(ok?.2:.32));});
  }catch(e){}
}

/* ===== utils ===== */
function pretty(t){return t.join(" ").replace(/\s+([?.!,])/g,"$1");}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ===== 提示：高亮下一個正確詞塊（不代填），每題限1次，用了這題不計正確率 ===== */
function hint(){
  if(qHinted)return;                       // 每題限1次
  const q=qList[qIdx];
  const need=q.t[answer.length];
  if(need===undefined)return;
  const o=q._tiles.find(x=>!x.taken&&x.w===need);
  if(!o)return;
  qHinted=true; updateHintBtn();
  glowTile(o.id);                          // 只閃給你看，還是要自己點
}
function glowTile(tid){
  const el=document.querySelector('#bank [data-tid="'+tid+'"]');
  if(!el)return;
  el.classList.add("glow");
  el.scrollIntoView({block:"nearest",behavior:"smooth"});
  setTimeout(()=>{el&&el.classList.remove("glow");},2600);
}
function updateHintBtn(){
  const b=$("#hintBtn"); if(!b)return;
  b.disabled=qHinted;
  b.innerHTML=qHinted?"💡 已用提示":"💡 提示";
}

  if(!V.length){pane.innerHTML='<div class=\"rvc-empty\">還沒有生字 📖<br>閱讀或做題時點不會的單字，就會收進這裡。</div>';return;}
  var h='<button class=\"rvc-primary\" id=\"rvcFl\">🃏 翻卡複習（'+V.length+'）</button>';
  V.forEach(function(e,idx){h+='<div class=\"rvc-word\"><div><div class=\"w\">'+esc(e.word)+' <span style=\"font-size:11px;color:#9aa\">'+esc(e.pos||'')+'</span></div><div class=\"z\">'+esc(e.zh)+'</div></div><span class=\"src\">'+esc(e.cat||'')+'</span>'
    +'<button class=\"rvc-ic\" data-say=\"'+esc(e.word)+'\">🔊</button>'
    +((!e.zh||e.zh==='（待查）')?'<button class=\"rvc-ic\" data-fill=\"'+esc(e.word)+'\">✏️</button>':'')
    +'<button class=\"rvc-ic\" data-del=\"'+esc(e.word)+'\">🗑️</button></div>';});
  pane.innerHTML=h;
  pane.querySelector('#rvcFl').addEventListener('click',function(){startFlash(V,o);});
  pane.querySelectorAll('[data-say]').forEach(function(b){b.addEventListener('click',function(){speak(b.dataset.say);});});
  pane.querySelectorAll('[data-fill]').forEach(function(b){b.addEventListener('click',function(){var w=b.dataset.fill,zh=prompt('輸入「'+w+'」的中文意思：');if(zh&&zh.trim()){R.setWordZh(w,zh.trim());o.remove();openSelf();}});});
  pane.querySelectorAll('[data-del]').forEach(function(b){b.addEventListener('click',function(){if(confirm('移除生字「'+b.dataset.del+'」？')){R.removeWord(b.dataset.del);o.remove();openSelf();}});});
}
function startFlash(V,parent){
  parent.remove();var i=0;var o=ov('🃏 生字翻卡','<div id=\"rvcF\"></div>');
  function draw(){var box=o.querySelector('#rvcF');if(i>=V.length){box.innerHTML='<div class=\"rvc-empty\">複習完成！👏</div><button class=\"rvc-primary\">完成</button>';box.querySelector('button').addEventListener('click',function(){o.remove();refreshFab();});return;}
    var e=V[i];box.innerHTML='<div class=\"rvc-flash\" id=\"cf\"><div class=\"fw\">'+esc(e.word)+'</div><div style=\"font-size:12px;color:#9aa;margin-top:6px\">點卡片看中文・🔊</div></div>';
    var flip=false,cf=box.querySelector('#cf');
    cf.addEventListener('click',function(){if(!flip){flip=true;cf.innerHTML='<div class=\"fw\">'+esc(e.word)+'</div><div class=\"fz\">'+esc(e.zh)+'</div>';speak(e.word);
      var g=document.createElement('div');g.className='rvc-grade';g.innerHTML='<button class=\"rvc-bad\">還不熟</button><button class=\"rvc-good\">記得了</button>';box.appendChild(g);
      g.children[0].addEventListener('click',function(){R.wordGraded(e.word,false);i++;draw();});
      g.children[1].addEventListener('click',function(){R.wordGraded(e.word,true);i++;draw();});
    }else speak(e.word);});}
  draw();
}
function mountSelf(){var fab=document.createElement('button');fab.id='rvcFab';fab.className='rvc-fab';fab.addEventListener('click',openSelf);document.body.appendChild(fab);refreshFab();}

/* ===== Hub：只總覽 ===== */
function mountOverview(){
  var host=document.getElementById('dash');var card=document.createElement('div');card.className='rvc-card';card.id='rvcCard';
  if(host&&host.parentNode)host.parentNode.insertBefore(card,host.nextSibling);else document.body.insertBefore(card,document.body.firstChild);
  var w=R.wrong(),v=R.words();var per={};
  function acc(id,kind){if(!NSMAP[id])return;per[id]=per[id]||{w:0,v:0};per[id][kind]++;}
  for(var k in w){if(w[k].due<=NOW)acc(w[k].app,'w');}
  for(var k2 in v){if(v[k2].due<=NOW)acc(v[k2].app,'v');}
  var ids=Object.keys(per);
  var h='<h3>📝 我的複習</h3>';
  if(!ids.length){h+='<div class=\"rvc-none\">目前沒有待複習的錯題或生字 🎉<br>去各 App 練習，答錯的題目、閱讀點的生字，會分別留在<b>那支 App</b> 裡等你複習。</div>';}
  else{h+='<div class=\"rvc-sub\">點進該 App 複習自己的錯題與生字（各程度分開，不混在一起）</div>';
    ids.forEach(function(id){var m=NSMAP[id],p=per[id];h+='<a class=\"rvc-approw\" href=\"'+m.url+'\"><div><div class=\"an\">'+esc(m.name)+'</div><div class=\"am\">'+(p.w?'錯題 '+p.w+' 題':'')+(p.w&&p.v?'・':'')+(p.v?'生字 '+p.v+' 個':'')+'</div></div><span class=\"ag\">去複習 ▶</span></a>';});}
  card.innerHTML=h;
}

if(ISHUB){if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',mountOverview);else mountOverview();}
else{if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',mountSelf);else mountSelf();}

<script>
(function(){
  var sig=document.getElementById('rlSig'); if(!sig) return;
  var app=document.getElementById('app'); if(!app) return;
  // 把簽名區塊掛到目前顯示的瀏覽分頁底部；答題(lesson)/完成(done)畫面不顯示
  function place(){
    var scr=app.querySelector('section.screen.on');
    if(!scr||scr.id==='lesson'||scr.id==='done'){ sig.style.display='none'; return; }
    sig.style.display='';
    if(scr.lastElementChild!==sig) scr.appendChild(sig);
  }
  // childList：分頁重繪(innerHTML)後重新掛入；attributes(class)：切換分頁 .on 時重掛
  new MutationObserver(place).observe(app,{subtree:true,childList:true,attributes:true,attributeFilter:['class']});
  if(document.readyState!=='loading') place();
  else document.addEventListener('DOMContentLoaded',place);
})();
</script>
<script>/*ENG_SYNC_MODULE_V2*/
window.__ENG_APP="pinju";window.__ENG_LABEL="英語拼句";
window.__ENG_SUMMARY=function(){
  var P=function(k){try{return JSON.parse(localStorage.getItem(k)||'{}')}catch(e){return{}}};
  var PR=P('pinju2'), ST=P('pinjuStat'), MI=P('pinjuMist');
  var total=(typeof flat!=='undefined'&&flat)?flat.length:0;
  var passed=Object.keys(PR).length;
  var s3=Object.keys(PR).filter(function(k){return PR[k]&&PR[k].stars===3}).length;
  var stages=0;
  try{ if(typeof STAGES!=='undefined'&&typeof stageAllDone==='function') stages=STAGES.filter(function(s,i){return stageAllDone(i)}).length; }catch(e){}
  var wa=Object.keys(MI).filter(function(k){return MI[k]&&MI[k].box<6}).length;
  return {pct: total?Math.round(passed/total*100):null, pctLabel:'關卡完成', total: total,
    streak: ST.streak||0,
    metrics:[{k:'過關',v:passed+'/'+total},{k:'三星',v:s3},{k:'大關全清',v:stages},{k:'待清錯題',v:wa}]};
};
(function(){
  var APP=window.__ENG_APP||'app', LABEL=window.__ENG_LABEL||document.title;
  var K={url:'eng_sync_url',key:'eng_sync_key',child:'eng_child'};
  function G(k){ try{return localStorage.getItem(k)||''}catch(e){return ''} }
  function cfg(){ return {url:G(K.url), key:G(K.key), child:G(K.child)}; }
  function ready(){ var c=cfg(); return !!(c.url&&c.child); }
  try{
    var m=(location.hash||'').match(/sync=(.+)$/);
    if(m){
      var p=m[1].split('~').map(function(s){try{return decodeURIComponent(s)}catch(e){return s}});
      if(p[0]) localStorage.setItem(K.url,p[0].replace(/\/+$/,''));
      if(p[1]) localStorage.setItem(K.key,p[1]);
      if(p[2]) localStorage.setItem(K.child,p[2]);
      try{history.replaceState(null,'',location.pathname+location.search)}catch(e){}
      setTimeout(function(){ alert('✅ 家長後台已設定：這台是「'+(p[2]||'')+'」的裝置，之後所有英語 App 都會自動回報進度。'); },300);
    }
  }catch(e){}
  function report(){ try{ return window.__ENG_SUMMARY()||{}; }catch(e){ return {}; } }
  var t=null;
  function push(beacon){
    var c=cfg(); if(!c.url||!c.child) return;
    var r=report();
    // 把 App 內的真實總數存到共用 key，供「一鍵導入頁」用(免寫死、內容變了也跟得上)
    try{ if(typeof r.total==='number' && r.total>0) localStorage.setItem('eng_total_'+APP, r.total); }catch(e){}
    var body=JSON.stringify({child:c.child, app:APP, label:LABEL, key:c.key, ts:Date.now(),
      pct:(r.pct===undefined?null:r.pct), pctLabel:r.pctLabel||'進度',
      streak:(r.streak===undefined?null:r.streak), metrics:r.metrics||[]});
    var url=c.url+'/report';
    try{
      if(beacon && navigator.sendBeacon){ navigator.sendBeacon(url, new Blob([body],{type:'text/plain'})); return; }
      fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:body,keepalive:true})
        .then(function(){setDot(true)}).catch(function(){setDot(false)});
    }catch(e){}
  }
  function schedule(){ if(!ready()) return; if(t) clearTimeout(t); t=setTimeout(function(){push(false)},6000); }
  try{
    var _si=Storage.prototype.setItem;
    Storage.prototype.setItem=function(k,v){
      var r=_si.apply(this,arguments);
      try{ var s=String(k); if(s!=='eng_sync_url'&&s!=='eng_sync_key'&&s!=='eng_child') schedule(); }catch(e){}
      return r;
    };
  }catch(e){}
  window.addEventListener('pagehide',function(){ if(ready()) push(true); });
  document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='hidden'&&ready()) push(true); });
  function setDot(ok){ var d=document.getElementById('engSyncDot'); if(d) d.style.background=ok?'#2eb872':'#e8504f'; }
  window.engSyncNow=function(){ push(false); };
  window.engSync={push:push,cfg:cfg,report:report};
  setTimeout(function(){
    if(!ready()) return;
    if(document.getElementById('engSyncBadge')) return;
    var c=cfg();
    var b=document.createElement('div'); b.id='engSyncBadge';
    b.style.cssText='position:fixed;left:8px;bottom:calc(var(--nav-h,60px) + env(safe-area-inset-bottom) + 8px);z-index:60;background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:3px 9px;border-radius:999px;display:flex;align-items:center;gap:5px;cursor:pointer';
    b.innerHTML='<span id="engSyncDot" style="width:8px;height:8px;border-radius:50%;background:#2eb872;display:inline-block"></span>☁️ '+c.child;
    b.title='點我立即同步'; b.onclick=function(){ engSyncNow(); };
    document.body.appendChild(b);
    push(false);
  }, 900);
})();
</script>

<script>/*HUBBACK*/(function(){if(window.__hubback)return;window.__hubback=1;
var OK=["https://fullmodel-star.github.io/english-hub/","https://fullmodel-star.github.io/english-apps/"];   /* 白名單：擋開放導向 */
var K='eng.hub.origin';
function ok(u){for(var i=0;i<OK.length;i++)if(OK[i]===u)return u;return null;}
function remember(){
  try{
    var q=new URLSearchParams(location.search).get('hub');
    var v=q&&ok(q);
    if(v){localStorage.setItem(K,v);return v;}
    /* 沒帶 query 也試 referrer：使用者可能是從 hub 的舊書籤／自己打的連結進來的 */
    if(document.referrer){var r=ok(new URL(document.referrer).origin+new URL(document.referrer).pathname);
      if(r){localStorage.setItem(K,r);return r;}}
    return ok(localStorage.getItem(K)||'');
  }catch(e){return null;}
}
var hub=remember();
window.__engHub=function(){
  /* 記住的優先；沒有才退回 App 內寫死的 CFG.hub（維持拆兩層時的預設分流） */
  try{return hub||window.__engHubDefault||null;}catch(e){return window.__engHubDefault||null;}
};
window.__engGoHub=function(){
  var u=window.__engHub(); if(!u)return;
  /* 家庭 hub 是 iframe srcdoc → 一定要跳到最上層，否則只是在鎖裡面再疊一層 */
  try{ (window.top||window).location.href=u; }catch(e){ location.href=u; }
};
/* 網址列把 ?hub= 收乾淨，小朋友分享連結時不會把入口資訊帶出去，重整也不會殘留 */
try{ if(new URLSearchParams(location.search).get('hub')&&history.replaceState){
  var u=new URL(location.href);u.searchParams.delete('hub');
  history.replaceState(null,'',u.pathname+(u.search==='?'?'':u.search)+u.hash);} }catch(e){}
})();</script>
